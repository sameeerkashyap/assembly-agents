# ══════════════════════════════════════════════════════════════════════════════
# Democratic Agents — Simulation Settings
# ══════════════════════════════════════════════════════════════════════════════

simulation:
  # Debate rounds per chamber
  senate_rounds: 3
  house_rounds: 2
  executive_rounds: 1     # Cabinet deliberation rounds before presidential decision
  scotus_rounds: 2        # Conference deliberation rounds before ruling

  # Agent counts (when --agents not specified via CLI)
  senate_agents: 10       # Balanced R/D subset selected by seniority
  house_agents: 20
  scotus_agents: 9        # Always all 9 justices

  # Voting thresholds (applied proportionally to simulated subset)
  senate_threshold: 0.51
  senate_cloture_threshold: 0.60
  house_threshold: 0.51
  scotus_threshold: 0.556  # 5/9
  veto_override_threshold: 0.667  # 2/3

  # Memory
  enable_memory: true
  memory_retrieval_limit: 5   # Past votes per agent retrieved per session

llm:
  # Local Hugging Face model used for all roles
  # Any instruction-tuned model with a chat template works here.
  # Recommended: meta-llama/Llama-3.1-8B-Instruct, mistralai/Mistral-7B-Instruct-v0.3
  # For CPU-only or low VRAM: microsoft/Phi-3-mini-4k-instruct
  model: "meta-llama/Llama-3.2-3B-Instruct"

  # Max new tokens per call
  debate_max_tokens: 256     # Short turns — agents speak 2-3 sentences
  vote_max_tokens: 512       # Longer — reasoning + PROS/CONS
  profile_max_tokens: 4096   # Profile generation needs full JSON output

  # Sampling
  debate_temperature: 0.8    # More varied speech
  vote_temperature: 0.4      # More consistent vote reasoning

database:
  path: "data/parliament.db"
  enable_checkpointing: true  # LangGraph SqliteSaver for session replay

output:
  summary_dir: "output/summaries"
  transcript_dir: "output/transcripts"
  votes_dir: "output/votes"
  format: "markdown"

logging:
  level: "INFO"
  file: "logs/parliament.log"
