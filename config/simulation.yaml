simulation:
  # Debate configuration
  max_debate_rounds: 3
  debate_time_per_agent: 120  # seconds (for future rate limiting)
  allow_agent_questions: true  # Agents can ask each other questions
  
  # Voting configuration
  voting_threshold: 0.5  # Simple majority (>50%)
  require_reasoning: true  # All votes must include reasoning
  require_data_backing: true  # Votes should reference data/sources
  
  # Features
  enable_web_research: true  # Speaker can scrape web for research
  enable_memory: true  # Agents remember past decisions
  enable_fact_checking: false  # Future: verify claims (not implemented)
  
  # Memory settings
  memory_retrieval_limit: 5  # How many past decisions to retrieve per agent
  memory_similarity_threshold: 0.7  # Semantic similarity for retrieval

llm:
  # LLM provider configuration
  provider: "openai"  # Options: "openai", "anthropic"
  model: "gpt-4"  # or "gpt-3.5-turbo", "claude-3-opus-20240229", etc.
  temperature: 0.7  # Creativity vs consistency (0.0-1.0)
  max_tokens: 1000  # Max tokens per response
  
  # For different agents, you can override:
  speaker_model: "gpt-4"  # Speaker might need more capable model
  debate_temperature: 0.8  # Higher creativity during debate
  voting_temperature: 0.5  # More consistency for voting

database:
  # Database configuration
  type: "sqlite"
  path: "data/parliament.db"
  
  # Schema options
  auto_create_tables: true
  enable_checkpointing: true  # For LangGraph state persistence
  
  # Performance
  connection_pool_size: 5
  enable_wal: true  # Write-Ahead Logging for better concurrency

logging:
  # Logging configuration
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "rich"  # "rich" for colored console, "json" for structured logs
  
  # Log files
  file_enabled: true
  file_path: "logs/parliament.log"
  file_rotation: "10 MB"
  file_retention: "30 days"
  
  # What to log
  log_llm_calls: true
  log_full_prompts: false  # Can be verbose
  log_agent_reasoning: true

output:
  # Output format for session results
  save_summary: true
  summary_path: "output/summaries"
  
  save_full_transcript: true
  transcript_path: "output/transcripts"
  
  save_voting_records: true
  voting_path: "output/votes"
  
  # Format
  output_format: "markdown"  # Options: "markdown", "json", "html"
