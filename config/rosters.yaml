executive:
  - name: Donald Trump
    role: President
    department: White House
    background: "Real estate mogul, 45th President (2017-2021), 47th President (2025-). Key priorities: immigration enforcement, tariffs, deregulation, 'America First' foreign policy."

  - name: J.D. Vance
    role: Vice President
    department: White House
    background: "Former Senator (OH), venture capitalist, author of Hillbilly Elegy. Populist-right on economics, hawkish on China, skeptical of Ukraine aid."

  - name: Marco Rubio
    role: Secretary of State
    department: State
    background: "Former Senator (FL), confirmed 99-0. Hawkish on China and Cuba, interventionist, traditional Republican foreign policy with MAGA alignment."

  - name: Scott Bessent
    role: Secretary of the Treasury
    department: Treasury
    background: "Hedge fund manager, Key Square Group founder. Advocates '3-3-3' plan: 3% GDP growth, 3% deficit, 3M barrels/day new oil production."

  - name: Pete Hegseth
    role: Secretary of Defense
    department: Defense
    background: "Fox News host, Army veteran (Iraq, Afghanistan, Guantanamo). Controversial confirmation. Focus on 'warrior culture', skeptical of DEI in military."

  - name: Pam Bondi
    role: Attorney General
    department: Justice
    background: "Former Florida AG. Trump legal adviser during first impeachment. Expected to pursue immigration enforcement, challenge state-level progressive DAs."

  - name: Doug Burgum
    role: Secretary of the Interior
    department: Interior
    background: "Former North Dakota Governor, software entrepreneur (Great Plains Software). Pro-energy development on federal lands."

  - name: Brooke Rollins
    role: Secretary of Agriculture
    department: Agriculture
    background: "Former head of America First Policy Institute. Texas A&M grad. Focus on deregulation of farming, trade deals for agricultural exports."

  - name: Howard Lutnick
    role: Secretary of Commerce
    department: Commerce
    background: "CEO of Cantor Fitzgerald (rebuilt after 9/11). Pro-tariff, advocates reshoring manufacturing. Led Trump transition team."

  - name: Lori Chavez-DeRemer
    role: Secretary of Labor
    department: Labor
    background: "Former Oregon Congresswoman. Notably moderate — one of few Republicans to support PRO Act provisions. Pro-union stances unusual for GOP."

  - name: Robert F. Kennedy Jr.
    role: Secretary of HHS
    department: Health and Human Services
    background: "Environmental lawyer turned health skeptic. Vaccine-critical, anti-processed food, anti-pharma. Heterodox: liberal on environment, populist on health."

  - name: Scott Turner
    role: Secretary of HUD
    department: Housing and Urban Development
    background: "Former NFL player, led White House Opportunity and Revitalization Council in Trump's first term. Focus on Opportunity Zones."

  - name: Sean Duffy
    role: Secretary of Transportation
    department: Transportation
    background: "Former Wisconsin Congressman (2010-2019), Fox Business host. Traditional conservative, focus on infrastructure permitting reform."

  - name: Chris Wright
    role: Secretary of Energy
    department: Energy
    background: "CEO of Liberty Energy (fracking). Outspoken climate skeptic, authored 'Bettering Human Lives' manifesto defending fossil fuels. Will push LNG exports, nuclear."

  - name: Linda McMahon
    role: Secretary of Education
    department: Education
    background: "Former WWE CEO. Ran SBA in Trump's first term. Strong school choice advocate. May oversee potential restructuring/downsizing of Department of Education."

  - name: Doug Collins
    role: Secretary of Veterans Affairs
    department: Veterans Affairs
    background: "Former Georgia Congressman, Air Force Reserve chaplain. Vocal Trump ally during first impeachment. Focus on VA accountability."

  - name: Susie Wiles
    role: White House Chief of Staff
    department: White House
    background: "First female Chief of Staff. Florida political operative, Trump 2024 campaign co-chair. Known for discipline and message control."

  - name: Russell Vought
    role: Director of OMB
    department: Office of Management and Budget
    background: "Project 2025 architect. Served as OMB director in Trump's first term. Aggressive budget cutter, wants to dismantle administrative state."

  - name: Tulsi Gabbard
    role: Director of National Intelligence
    department: Intelligence Community
    background: "Former Hawaii Congresswoman (D turned R), Army veteran. Non-interventionist foreign policy, skeptical of intelligence community."

  - name: Lee Zeldin
    role: EPA Administrator
    department: Environmental Protection Agency
    background: "Former New York Congressman, ran for NY Governor 2022. Deregulation focus, rolling back Biden-era EPA rules on emissions and water."

  - name: John Ratcliffe
    role: CIA Director
    department: Central Intelligence Agency
    background: "Former DNI in Trump's first term, former Texas Congressman. Hawkish on China, advocates CIA reform and reduced 'politicization'."

  - name: Jamieson Greer
    role: U.S. Trade Representative
    department: Trade
    background: "Former chief of staff to Robert Lighthizer. Architect of Trump tariff strategy. Trade hawk, advocates decoupling from China."

scotus:
  - name: John Roberts
    role: Chief Justice
    appointedBy: George W. Bush
    year: 2005
    priorRole: D.C. Circuit Judge, Deputy Solicitor General
    background: "Institutionalist conservative. Increasingly the swing vote as median justice. Sided with liberals on ACA (2012, 2015, 2021), census citizenship question. Prioritizes Court legitimacy and incrementalism."

  - name: Clarence Thomas
    role: Associate Justice
    appointedBy: George H.W. Bush
    year: 1991
    priorRole: D.C. Circuit Judge, EEOC Chairman
    background: "Most conservative justice. Originalist willing to overturn virtually any precedent he considers wrong. Wrote concurrences calling for overturning Chevron (before Loper Bright), New York Times v. Sullivan, Griswold v. Connecticut."

  - name: Samuel Alito
    role: Associate Justice
    appointedBy: George W. Bush
    year: 2006
    priorRole: Third Circuit Judge, U.S. Attorney (NJ)
    background: "Reliable conservative, author of Dobbs (overturning Roe). Strong on religious liberty, executive power, skeptical of regulatory state. More incrementalist than Thomas but reaches similar conclusions."

  - name: Sonia Sotomayor
    role: Associate Justice
    appointedBy: Barack Obama
    year: 2009
    priorRole: Second Circuit Judge, District Court Judge
    background: "Most liberal justice. Passionate dissenter, especially on criminal justice, race, and immigration. Former prosecutor gives her credibility on criminal law. Grew up in Bronx public housing."

  - name: Elena Kagan
    role: Associate Justice
    appointedBy: Barack Obama
    year: 2010
    priorRole: Solicitor General, Harvard Law Dean
    background: "Strategic liberal. Best writer on the Court. Often crafts narrow opinions to attract conservative votes. Her Loper Bright dissent (defending Chevron) was landmark. Never served as judge before SCOTUS."

  - name: Neil Gorsuch
    role: Associate Justice
    appointedBy: Donald Trump
    year: 2017
    priorRole: Tenth Circuit Judge
    background: "Textualist with libertarian streak. Authored Bostock (LGBTQ employment rights) based on statutory text despite conservative opposition. Strong on Native American treaty rights, anti-administrative state (key vote in Loper Bright)."

  - name: Brett Kavanaugh
    role: Associate Justice
    appointedBy: Donald Trump
    year: 2018
    priorRole: D.C. Circuit Judge, Bush White House Staff Secretary
    background: "Incrementalist conservative. Current median justice. Often writes narrow concurrences limiting how far majority opinions go. Strong on executive power (worked for Ken Starr, then Bush White House)."

  - name: Amy Coney Barrett
    role: Associate Justice
    appointedBy: Donald Trump
    year: 2020
    priorRole: Seventh Circuit Judge, Notre Dame Law professor
    background: "Originalist conservative but has shown more independence than expected. Departed from Thomas/Alito on ghost gun case, some standing questions. Strong on religious liberty. Academic temperament."

  - name: Ketanji Brown Jackson
    role: Associate Justice
    appointedBy: Joe Biden
    year: 2022
    priorRole: D.C. Circuit Judge, U.S. Sentencing Commission
    background: "Liberal with focus on historical context and race. Former public defender — brings criminal defense perspective rare on modern Court. Bold early opinions. Engaged questioner at oral argument."
